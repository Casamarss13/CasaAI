<!DOCTYPE html>
<html lang="fr" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASA CLIP | Global Sovereign V1.51</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3b82f6; --surface: rgba(255,255,255,0.02); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; overflow-x: hidden; }
        .glass { background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 32px; backdrop-filter: blur(40px); }
        .btn-elite { background: linear-gradient(135deg, var(--blue), #1d4ed8); font-weight: 800; border-radius: 20px; transition: 0.4s; }
        .tab-btn { transition: 0.3s; color: rgba(255,255,255,0.4); border-radius: 12px; cursor: pointer; }
        .tab-btn.active { background: var(--blue); color: white; box-shadow: 0 0 25px rgba(59,130,246,0.6); opacity: 1; }
        .promo-banner { background: linear-gradient(90deg, #1e3a8a, #3b82f6, #1e3a8a); background-size: 200% auto; animation: wave 5s infinite linear; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        section { display: none; opacity: 0; }
        section.active { display: block; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Support pour l'écriture Arabe */
        .rtl { direction: rtl; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="fixed top-0 left-0 w-full z-[100] promo-banner py-3 text-center text-[10px] font-900 uppercase tracking-widest shadow-2xl">
    <span id="txt-promo">Offre Limitée</span> — <span id="spots">42</span> <span id="txt-spots">places restantes</span>
</div>

<nav class="max-w-[1500px] mx-auto flex justify-between items-center p-8 glass mt-12 mb-20 gap-6 border-white/10">
    <div class="flex items-center gap-4 cursor-pointer" onclick="App.view('landing')">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-900 italic shadow-lg shadow-blue-500/20">CC</div>
        <h1 class="text-xl font-900 italic uppercase tracking-tighter">CASA CLIP</h1>
    </div>
    
    <div class="flex items-center gap-4">
        <select id="lang-switch" onchange="App.refresh()" class="bg-white/5 text-[9px] font-900 p-2 rounded-lg outline-none border border-white/5">
            <option value="zh">ZH 🇨🇳</option>
            <option value="hi">HI 🇮🇳</option>
            <option value="es">ES 🇪🇸</option>
            <option value="ar">AR 🇸🇦</option>
            <option value="fr">FR 🇫🇷</option>
            <option value="en">EN 🇺🇸</option>
        </select>
        <select id="curr-switch" onchange="App.refresh()" class="bg-white/5 text-[9px] font-900 p-2 rounded-lg outline-none border border-white/5">
            <option value="EUR">€ EUR</option>
            <option value="USD">$ USD</option>
        </select>
    </div>
</nav>

<section id="pricing" class="active max-w-6xl mx-auto text-center pb-20">
    <h2 class="text-6xl font-900 italic uppercase mb-12" id="txt-title">Tarifs Elite</h2>
    
    <div class="flex justify-center mb-16">
        <div class="glass p-2 flex gap-2 rounded-2xl border-white/10 shadow-inner">
            <button onclick="App.setMode('libre')" id="btn-libre" class="tab-btn px-8 py-4 text-[10px] font-900 uppercase">Libre</button>
            <button onclick="App.setMode('fidélité')" id="btn-fid" class="tab-btn active px-8 py-4 text-[10px] font-900 uppercase">Engagement</button>
            <button onclick="App.setMode('annuel')" id="btn-ann" class="tab-btn px-8 py-4 text-[10px] font-900 uppercase">Annuel</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="glass p-10 border-white/5 hover:border-blue-500/20 transition duration-500">
            <p class="text-[10px] font-900 text-blue-500 mb-6 uppercase tracking-widest">Essential</p>
            <div id="p-ess" class="text-6xl font-900 mb-4 italic">14.90€</div>
            <p id="l-ess" class="text-[9px] opacity-40 font-bold uppercase mb-10">Engagement 12 mois</p>
            <button class="w-full btn-elite py-5 text-[10px] uppercase italic">Select Plan</button>
        </div>
        <div class="glass p-10 border-blue-500/40 scale-105 bg-white/[0.01] shadow-2xl">
            <p class="text-[10px] font-900 text-blue-500 mb-6 uppercase tracking-widest">Creator Pro</p>
            <div id="p-cre" class="text-6xl font-900 mb-4 italic">29.00€</div>
            <p id="l-cre" class="text-[9px] opacity-40 font-bold uppercase mb-10">Engagement 12 mois</p>
            <button class="w-full bg-white text-black py-5 rounded-2xl font-900 text-[10px] uppercase hover:bg-blue-600 hover:text-white transition">Select Plan</button>
        </div>
        <div class="glass p-10 border-white/5 opacity-60">
            <p class="text-[10px] font-900 text-blue-500 mb-6 uppercase tracking-widest">Power User</p>
            <div id="p-pow" class="text-6xl font-900 mb-4 italic">49.00€</div>
            <p id="l-pow" class="text-[9px] opacity-40 font-bold uppercase mb-10">Engagement 12 mois</p>
            <button class="w-full border border-white/10 py-5 rounded-2xl font-900 text-[10px] uppercase hover:bg-white/5 transition">Select Plan</button>
        </div>
    </div>
</section>

<footer class="max-w-[1500px] mx-auto mt-20 pt-10 border-t border-white/5 px-10">
    <div class="flex flex-col md:flex-row justify-between items-center gap-10 opacity-30 text-[9px] font-900 uppercase tracking-[0.3em]">
        <div class="flex items-center gap-4">
            <div class="w-6 h-6 bg-white/10 rounded-md"></div>
            <span>© 2026 Casa Clip Sovereign Elite</span>
        </div>
        <div class="flex gap-10">
            <span class="text-blue-500 cursor-pointer">CGV / Rupture Contractuelle</span>
            <span class="cursor-pointer">Privacy Policy</span>
            <span class="cursor-pointer">GPU Status</span>
        </div>
    </div>
</footer>

<script>
const App = {
    mode: 'fidélité',
    prices: {
        libre: [19.90, 39.00, 59.00],
        fidélité: [14.90, 29.00, 49.00],
        annuel: [149.00, 290.00, 490.00]
    },
    trans: {
        zh: { title: "精英定价", libre: "灵活模式", fid: "12个月签约", ann: "年度支付", leg: "12个月合同", leg_free: "无约束", leg_ann: "一次性付款" },
        hi: { title: "एलीट मूल्य निर्धारण", libre: "लचीला", fid: "मासिक (1 वर्ष)", ann: "वार्षिक", leg: "12 महीने का अनुबंध", leg_free: "कोई प्रतिबद्धता नहीं", leg_ann: "एक बार भुगतान" },
        es: { title: "Precios Elite", libre: "Flexible", fid: "Mensual (1añ)", ann: "Anual", leg: "Contrato 12 meses", leg_free: "Sin Compromiso", leg_ann: "Pago único" },
        ar: { title: "تسعير النخبة", libre: "مرن", fid: "شهري (سنة)", ann: "سنوي", leg: "عقد 12 شهراً", leg_free: "بدون التزام", leg_ann: "دفع لمرة واحدة" },
        fr: { title: "Tarifs Elite", libre: "Option Libre", fid: "Mensuel (1an)", ann: "Annuel", leg: "Engagé 12 mois", leg_free: "Sans Engagement", leg_ann: "Paiement Unique" },
        en: { title: "Elite Pricing", libre: "Flexible", fid: "Monthly (1yr)", ann: "Yearly", leg: "12 Months Contract", leg_free: "No Commitment", leg_ann: "One-time Payment" }
    },
    setMode(m) {
        this.mode = m;
        // Reset and Apply Active Class
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + m.substring(0,3));
        if(activeBtn) activeBtn.classList.add('active');
        this.refresh();
    },
    refresh() {
        const lang = document.getElementById('lang-switch').value;
        const curr = document.getElementById('curr-switch').value;
        const rate = (curr === 'USD') ? 1.10 : 1.0;
        const sym = (curr === 'USD') ? '$' : '€';

        // RTL Support for Arabic
        document.body.classList.toggle('rtl', lang === 'ar');

        // Update Title and Tabs
        document.getElementById('txt-title').innerText = this.trans[lang].title;
        document.getElementById('btn-lib').innerText = this.trans[lang].libre;
        document.getElementById('btn-fid').innerText = this.trans[lang].fid;
        document.getElementById('btn-ann').innerText = this.trans[lang].ann;

        // Prices & Legends
        const ids = ['p-ess', 'p-cre', 'p-pow'];
        const lids = ['l-ess', 'l-cre', 'l-pow'];
        const legKey = (this.mode === 'libre') ? 'leg_free' : (this.mode === 'annuel' ? 'leg_ann' : 'leg');

        ids.forEach((id, i) => {
            document.getElementById(id).innerText = (this.prices[this.mode][i] * rate).toFixed(2) + sym;
        });
        lids.forEach(id => {
            document.getElementById(id).innerText = this.trans[lang][legKey];
        });
    },
    view(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
};
// Correction ID alias pour le switcher
document.getElementById('btn-lib').id = 'btn-lib'; // Alias interne

App.refresh();
</script>
</body>
</html>
