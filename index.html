<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASCLIP | AI Shorts Studio</title>
  <meta name="description" content="CASCLIP — plateforme simple pour transformer des vidéos en shorts." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="banner fixed top-0 left-0 w-full z-50 py-2 px-4 text-center text-[10px] font-extrabold uppercase tracking-[0.30em]">
    <span data-i18n="banner_offer"></span> — <span id="spots">42</span> <span data-i18n="banner_spots"></span> • <span data-i18n="banner_trial"></span>
  </div>

  <nav class="fixed top-10 left-1/2 -translate-x-1/2 z-40 nav-shell glass p-4">
    <div class="flex items-center justify-between gap-4">
      <button class="flex items-center gap-3 text-left min-w-0 bg-transparent border-none cursor-pointer" data-view="home">
        <div class="logo-box">CC</div>
        <div class="min-w-0">
          <div class="text-sm font-black uppercase tracking-[0.22em] truncate">CASCLIP</div>
          <div class="text-[10px] uppercase tracking-[0.28em] muted-2 truncate" data-i18n="brand_sub"></div>
        </div>
      </button>

      <div class="desktop-nav flex items-center gap-3">
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="home" data-i18n="nav_home"></button>
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="pricing" data-i18n="nav_pricing"></button>
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="studio" data-i18n="nav_studio"></button>
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="about" data-i18n="nav_about"></button>
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="support" data-i18n="nav_support"></button>
        <button class="nav-link px-4 text-[11px] font-black uppercase tracking-[0.16em]" id="open-legal" data-i18n="nav_legal"></button>
      </div>

      <div class="desktop-actions flex items-center gap-3">
        <select id="lang" class="select lang-select !w-auto !py-3 !px-4 text-[12px] font-bold uppercase">
          <option value="fr">FR</option>
          <option value="en">EN</option>
          <option value="es">ES</option>
          <option value="ar">AR</option>
          <option value="hi">HI</option>
          <option value="zh">ZH</option>
        </select>

        <select id="currency" class="select lang-select !w-auto !py-3 !px-4 text-[12px] font-bold uppercase">
          <option value="EUR">EUR €</option>
          <option value="USD">USD $</option>
          <option value="GBP">GBP £</option>
          <option value="MAD">MAD د.م.</option>
          <option value="AED">AED د.إ</option>
          <option value="SAR">SAR ر.س</option>
          <option value="CNY">CNY ¥</option>
          <option value="INR">INR ₹</option>
        </select>

        <button class="btn-ghost px-5 py-3 text-[11px] font-extrabold uppercase tracking-[0.18em]" id="open-login" data-i18n="login"></button>
        <button class="btn-gold px-6 py-3 text-[11px] font-extrabold uppercase tracking-[0.18em]" id="open-register" data-i18n="register"></button>
      </div>

      <button id="hamburger" class="mobile-only nav-link w-[52px] h-[52px] text-xl font-black">☰</button>
    </div>
  </nav>

  <div id="drawer" class="drawer">
    <div class="drawer-backdrop"></div>
    <div class="drawer-panel">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="text-sm font-black uppercase tracking-[0.22em]">CASCLIP</div>
          <div class="text-[10px] uppercase tracking-[0.28em] muted-2" data-i18n="mobile_menu"></div>
        </div>
        <button id="drawer-close" class="btn-ghost px-4 py-3 text-[11px] font-black uppercase">Close</button>
      </div>

      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="home" data-i18n="nav_home"></button>
      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="pricing" data-i18n="nav_pricing"></button>
      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="studio" data-i18n="nav_studio"></button>
      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="about" data-i18n="nav_about"></button>
      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" data-view="support" data-i18n="nav_support"></button>
      <button class="nav-link !justify-start px-4 text-[11px] font-black uppercase tracking-[0.16em]" id="open-legal-mobile" data-i18n="nav_legal"></button>

      <div class="panel p-4">
        <div class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2 mb-2" data-i18n="language"></div>
        <select id="lang-mobile" class="select text-[12px] font-bold uppercase">
          <option value="fr">FR</option>
          <option value="en">EN</option>
          <option value="es">ES</option>
          <option value="ar">AR</option>
          <option value="hi">HI</option>
          <option value="zh">ZH</option>
        </select>

        <div class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2 mt-4 mb-2" data-i18n="currency"></div>
        <select id="currency-mobile" class="select text-[12px] font-bold uppercase">
          <option value="EUR">EUR €</option>
          <option value="USD">USD $</option>
          <option value="GBP">GBP £</option>
          <option value="MAD">MAD د.م.</option>
          <option value="AED">AED د.إ</option>
          <option value="SAR">SAR ر.س</option>
          <option value="CNY">CNY ¥</option>
          <option value="INR">INR ₹</option>
        </select>
      </div>

      <button class="btn-ghost px-5 py-3 text-[11px] font-extrabold uppercase tracking-[0.18em]" id="open-login-mobile" data-i18n="login"></button>
      <button class="btn-gold px-6 py-3 text-[11px] font-extrabold uppercase tracking-[0.18em]" id="open-register-mobile" data-i18n="register"></button>
    </div>
  </div>

  <main>
    <section id="home" class="section">
      <div class="max-w-[1480px] mx-auto">
        <div class="hero-grid">
          <div>
            <div class="badge mb-4"><span data-i18n="hero_badge"></span></div>
            <h1 class="hero-title font-black uppercase mb-5">
              <span data-i18n="hero_line_1"></span><br>
              <span class="gold-text" data-i18n="hero_line_2"></span>
            </h1>
            <p class="max-w-3xl text-[16px] md:text-[18px] leading-8 muted" data-i18n="hero_desc"></p>
            <div class="mt-8 flex flex-wrap gap-4">
              <button class="btn-gold px-8 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-view="studio" data-i18n="cta_try"></button>
              <button class="btn-ghost px-8 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-view="pricing" data-i18n="cta_pricing"></button>
              <button class="btn-ghost px-8 py-4 text-[12px] font-black uppercase tracking-[0.18em]" id="open-register-hero" data-i18n="cta_start"></button>
            </div>
            <div class="mt-8 flex flex-wrap gap-3">
              <div class="pill"><span data-i18n="pill_1"></span></div>
              <div class="pill warn"><span data-i18n="pill_2"></span></div>
              <div class="pill"><span data-i18n="pill_3"></span></div>
            </div>
          </div>

          <div class="panel p-5 md:p-7">
            <div class="grid grid-cols-2 gap-4">
              <div class="metric p-5">
                <p class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2" data-i18n="stat_success"></p>
                <p class="mt-2 text-[28px] font-black gold-text">99.2%</p>
              </div>
              <div class="metric p-5">
                <p class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2">1080P</p>
                <p class="mt-2 text-[28px] font-black gold-text">Full HD</p>
              </div>
              <div class="metric p-5">
                <p class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2" data-i18n="stat_average"></p>
                <p class="mt-2 text-[28px] font-black gold-text">3 / vidéo</p>
              </div>
              <div class="metric p-5">
                <p class="text-[11px] uppercase tracking-[0.18em] font-extrabold muted-2" data-i18n="stat_support"></p>
                <p class="mt-2 text-[28px] font-black gold-text">7J/7</p>
              </div>
            </div>
            <div class="mt-5 card p-5">
              <div class="text-[14px] font-black uppercase tracking-[0.18em]" data-i18n="promise_title"></div>
              <p class="mt-3 text-[14px] leading-7 muted" data-i18n="promise_desc"></p>
            </div>
          </div>
        </div>

        <div class="features-grid mt-10">
          <div class="card p-6"><div class="text-[13px] font-black uppercase tracking-[0.18em]" data-i18n="feature_1_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="feature_1_desc"></p></div>
          <div class="card p-6"><div class="text-[13px] font-black uppercase tracking-[0.18em]" data-i18n="feature_2_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="feature_2_desc"></p></div>
          <div class="card p-6"><div class="text-[13px] font-black uppercase tracking-[0.18em]" data-i18n="feature_3_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="feature_3_desc"></p></div>
          <div class="card p-6"><div class="text-[13px] font-black uppercase tracking-[0.18em]" data-i18n="feature_4_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="feature_4_desc"></p></div>
        </div>
      </div>
    </section>

    <section id="pricing" class="section" hidden>
      <div class="max-w-[1480px] mx-auto">
        <div class="text-center max-w-4xl mx-auto">
          <div class="text-[11px] uppercase tracking-[0.44em] font-extrabold muted-2" data-i18n="pricing_badge"></div>
          <h2 class="mt-4 text-[36px] md:text-[62px] font-black uppercase tracking-[-.04em]" data-i18n="pricing_title"></h2>
          <p class="mt-4 text-[15px] md:text-[17px] leading-8 muted" data-i18n="pricing_desc"></p>
          <div class="mt-8 pricing-switch">
            <button id="billing-month" class="chip active-chip px-5 py-3 text-[11px] font-black uppercase tracking-[0.16em]" data-i18n="monthly"></button>
            <button id="billing-year" class="chip px-5 py-3 text-[11px] font-black uppercase tracking-[0.16em]" data-i18n="yearly"></button>
            <div class="chip px-4 py-3 text-[10px] font-black uppercase tracking-[0.18em] text-[#8a6210] border-[rgba(199,156,43,.28)] bg-[rgba(199,156,43,.08)]">-25%</div>
          </div>
        </div>

        <div class="pricing-grid mt-12">
          <article class="plan p-7 flex flex-col justify-between">
            <div>
              <div class="text-[11px] uppercase tracking-[0.32em] font-black text-[#9a7318]">PLAN 01</div>
              <h3 class="mt-4 text-[28px] font-black">Starter</h3>
              <div id="price-starter" class="price mt-6 gold-text"></div>
              <p id="label-starter" class="mt-3 text-[11px] uppercase tracking-[0.18em] muted-2 font-extrabold"></p>
              <div class="mt-7 space-y-4 text-[14px] leading-7">
                <p data-i18n="starter_1"></p><p data-i18n="starter_2"></p><p data-i18n="starter_3"></p><p data-i18n="starter_4"></p><p data-i18n="starter_5"></p>
              </div>
            </div>
            <button class="btn-ghost mt-9 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-i18n="choose_plan" data-plan="starter"></button>
          </article>

          <article class="plan p-7 flex flex-col justify-between border-[rgba(199,156,43,.3)] shadow-[0_18px_60px_rgba(199,156,43,.14)]">
            <div>
              <div class="flex items-center justify-between gap-3">
                <div class="text-[11px] uppercase tracking-[0.32em] font-black text-[#9a7318]">PLAN 02</div>
                <div class="badge !py-2 !px-3" data-i18n="most_popular"></div>
              </div>
              <h3 class="mt-4 text-[28px] font-black">Creator</h3>
              <div id="price-creator" class="price mt-6 gold-text"></div>
              <p id="label-creator" class="mt-3 text-[11px] uppercase tracking-[0.18em] muted-2 font-extrabold"></p>
              <div class="mt-7 space-y-4 text-[14px] leading-7">
                <p data-i18n="creator_1"></p><p data-i18n="creator_2"></p><p data-i18n="creator_3"></p><p data-i18n="creator_4"></p><p data-i18n="creator_5"></p>
              </div>
            </div>
            <button class="btn-gold mt-9 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-i18n="choose_plan" data-plan="creator"></button>
          </article>

          <article class="plan p-7 flex flex-col justify-between">
            <div>
              <div class="text-[11px] uppercase tracking-[0.32em] font-black text-[#9a7318]">PLAN 03</div>
              <h3 class="mt-4 text-[28px] font-black">Studio</h3>
              <div id="price-studio" class="price mt-6 gold-text"></div>
              <p id="label-studio" class="mt-3 text-[11px] uppercase tracking-[0.18em] muted-2 font-extrabold"></p>
              <div class="mt-7 space-y-4 text-[14px] leading-7">
                <p data-i18n="studio_1"></p><p data-i18n="studio_2"></p><p data-i18n="studio_3"></p><p data-i18n="studio_4"></p><p data-i18n="studio_5"></p>
              </div>
            </div>
            <button class="btn-ghost mt-9 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-i18n="choose_plan" data-plan="studio"></button>
          </article>

          <article class="plan p-7 flex flex-col justify-between">
            <div>
              <div class="text-[11px] uppercase tracking-[0.32em] font-black text-[#9a7318]">PLAN 04</div>
              <h3 class="mt-4 text-[28px] font-black">Agency</h3>
              <div id="price-agency" class="price mt-6 gold-text"></div>
              <p id="label-agency" class="mt-3 text-[11px] uppercase tracking-[0.18em] muted-2 font-extrabold"></p>
              <div class="mt-7 space-y-4 text-[14px] leading-7">
                <p data-i18n="agency_1"></p><p data-i18n="agency_2"></p><p data-i18n="agency_3"></p><p data-i18n="agency_4"></p><p data-i18n="agency_5"></p>
              </div>
            </div>
            <button class="btn-ghost mt-9 py-4 text-[12px] font-black uppercase tracking-[0.18em]" data-i18n="choose_plan" data-plan="agency"></button>
          </article>
        </div>
      </div>
    </section>

    <section id="studio" class="section" hidden>
      <div class="max-w-[1480px] mx-auto">
        <div class="text-center max-w-4xl mx-auto">
          <div class="text-[11px] uppercase tracking-[0.44em] font-extrabold muted-2" data-i18n="studio_badge"></div>
          <h2 class="mt-4 text-[36px] md:text-[62px] font-black uppercase tracking-[-.04em]" data-i18n="studio_title"></h2>
          <p class="mt-4 text-[15px] md:text-[17px] leading-8 muted" data-i18n="studio_desc"></p>
        </div>

        <div class="about-grid mt-12">
          <div class="panel p-6 md:p-8">
            <div class="text-[18px] font-black" data-i18n="upload_title"></div>
            <p class="mt-2 text-[14px] leading-7 muted" data-i18n="upload_desc"></p>
            <input id="video-file" type="file" class="hidden" accept="video/*,.mp4,.mov,.webm,.mkv,.avi,.m4v,.mpeg,.mpg" />
            <div class="mt-5 grid grid-cols-1 md:grid-cols-2 gap-4">
              <input id="project-name" class="input" data-ph="project_name_ph" />
              <input id="source-url" class="input" data-ph="source_url_ph" />
              <select id="platform" class="select"><option>TikTok</option><option>YouTube Shorts</option><option>Instagram Reels</option><option>Snapchat Spotlight</option></select>
              <select id="template" class="select"><option>Impact Gold</option><option>Creator Clean</option><option>Luxury Minimal</option><option>Bold Viral</option></select>
              <select id="subtitle-style" class="select"><option value="dynamic" data-i18n="sub_dynamic"></option><option value="karaoke" data-i18n="sub_karaoke"></option><option value="clean" data-i18n="sub_clean"></option><option value="big-hook" data-i18n="sub_hook"></option></select>
              <select id="target-shorts" class="select"><option value="2">2 shorts</option><option value="3" selected>3 shorts</option><option value="4">4 shorts</option><option value="5">5 shorts</option></select>
            </div>
            <div class="mt-5">
              <button id="pick-video" class="btn-gold px-6 py-4 text-[12px] font-black uppercase" data-i18n="choose_video"></button>
            </div>
            <div class="mt-5">
              <div class="text-[18px] font-black" data-i18n="brief_title"></div>
              <p class="mt-2 text-[14px] leading-7 muted" data-i18n="brief_desc"></p>
              <textarea id="creative-brief" class="textarea mt-4" data-ph="brief_ph"></textarea>
            </div>
          </div>

          <div class="space-y-6">
            <div class="video-stage">
              <video id="video-preview" controls playsinline preload="metadata"></video>
              <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center px-6">
                <div class="w-20 h-20 rounded-full flex items-center justify-center text-3xl font-black border border-[rgba(199,156,43,.28)] bg-[rgba(199,156,43,.10)] text-[#f3d993]">▶</div>
                <div class="mt-5 text-[18px] font-black text-white" data-i18n="preview_title"></div>
                <p class="mt-3 max-w-md text-[14px] leading-7 text-white/78" data-i18n="preview_desc"></p>
              </div>
              <div class="watermark">CASCLIP</div>
            </div>

            <div class="panel p-6">
              <div class="flex items-center justify-between gap-4 flex-wrap">
                <div>
                  <div class="text-[20px] font-black" data-i18n="queue_title"></div>
                  <p class="mt-2 text-[14px] leading-7 muted" data-i18n="queue_desc"></p>
                </div>
                <div class="pill warn"><span data-i18n="queue_hint"></span></div>
              </div>
              <div class="mt-5 flex flex-wrap gap-3">
                <button class="btn-gold px-6 py-4 text-[12px] font-black uppercase" id="simulate-render" data-i18n="simulate_render"></button>
                <button class="btn-ghost px-6 py-4 text-[12px] font-black uppercase" id="reset-studio" data-i18n="reset"></button>
              </div>
              <div id="queue-list" class="mt-5 space-y-4"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="section" hidden>
      <div class="max-w-[1480px] mx-auto">
        <div class="text-center max-w-4xl mx-auto">
          <div class="text-[11px] uppercase tracking-[0.44em] font-extrabold muted-2" data-i18n="about_badge"></div>
          <h2 class="mt-4 text-[36px] md:text-[62px] font-black uppercase tracking-[-.04em]" data-i18n="about_title"></h2>
          <p class="mt-4 text-[15px] md:text-[17px] leading-8 muted" data-i18n="about_desc"></p>
        </div>
        <div class="about-grid mt-12">
          <div class="panel p-7"><div class="text-[24px] font-black" data-i18n="mission_title"></div><p class="mt-4 text-[15px] leading-8 muted" data-i18n="mission_desc"></p></div>
          <div class="panel p-7"><div class="text-[24px] font-black" data-i18n="why_title"></div><p class="mt-4 text-[15px] leading-8 muted" data-i18n="why_desc"></p></div>
        </div>
      </div>
    </section>

    <section id="support" class="section" hidden>
      <div class="max-w-[1480px] mx-auto">
        <div class="text-center max-w-4xl mx-auto">
          <div class="text-[11px] uppercase tracking-[0.44em] font-extrabold muted-2" data-i18n="support_badge"></div>
          <h2 class="mt-4 text-[36px] md:text-[62px] font-black uppercase tracking-[-.04em]" data-i18n="support_title"></h2>
          <p class="mt-4 text-[15px] md:text-[17px] leading-8 muted" data-i18n="support_desc"></p>
        </div>

        <div class="support-grid mt-12">
          <div class="panel p-6">
            <div class="text-[24px] font-black" data-i18n="contact_form_title"></div>
            <p class="mt-3 text-[14px] leading-7 muted" data-i18n="contact_form_desc"></p>
            <div class="mt-5 grid grid-cols-1 gap-4">
              <input id="contact-name" class="input" data-ph="contact_name_ph" />
              <input id="contact-email" class="input" type="email" data-ph="contact_email_ph" />
              <select id="contact-category" class="select"><option data-i18n="cat_billing"></option><option data-i18n="cat_tech"></option><option data-i18n="cat_project"></option><option data-i18n="cat_account"></option><option data-i18n="cat_partner"></option></select>
              <textarea id="contact-message" class="textarea" data-ph="contact_message_ph"></textarea>
              <div class="flex flex-wrap gap-3">
                <button class="btn-gold px-6 py-4 text-[12px] font-black uppercase" id="send-contact" data-i18n="send_message"></button>
                <button class="btn-ghost px-6 py-4 text-[12px] font-black uppercase" id="open-register-support" data-i18n="open_account"></button>
              </div>
            </div>
          </div>

          <div class="space-y-6">
            <div class="panel p-6">
              <div class="text-[24px] font-black" data-i18n="faq_title"></div>
              <div class="mt-5 space-y-4">
                <div class="faq-item"><button class="faq-btn"><span data-i18n="faq_q1"></span><span>+</span></button><div class="faq-answer"><p class="text-[14px] leading-7 muted" data-i18n="faq_a1"></p></div></div>
                <div class="faq-item"><button class="faq-btn"><span data-i18n="faq_q2"></span><span>+</span></button><div class="faq-answer"><p class="text-[14px] leading-7 muted" data-i18n="faq_a2"></p></div></div>
                <div class="faq-item"><button class="faq-btn"><span data-i18n="faq_q3"></span><span>+</span></button><div class="faq-answer"><p class="text-[14px] leading-7 muted" data-i18n="faq_a3"></p></div></div>
              </div>
            </div>
            <div class="panel p-6"><div class="text-[24px] font-black" data-i18n="security_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="security_desc"></p></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="border-t border-[rgba(70,52,23,.08)] bg-[rgba(255,255,255,.52)] px-[5%] py-10 backdrop-blur">
    <div class="max-w-[1480px] mx-auto flex flex-col lg:flex-row items-start lg:items-center justify-between gap-8">
      <div><div class="text-[24px] font-black uppercase tracking-[0.18em] gold-text">CASCLIP</div><p class="mt-3 text-[13px] leading-7 muted max-w-xl" data-i18n="footer_desc"></p></div>
      <div class="flex flex-wrap items-center gap-6 text-[11px] font-extrabold uppercase tracking-[0.18em] muted">
        <button class="bg-transparent border-none cursor-pointer hover:text-[#8a6210] transition" id="open-legal-footer" data-i18n="footer_terms"></button>
        <button class="bg-transparent border-none cursor-pointer hover:text-[#8a6210] transition" data-view="support" data-i18n="footer_support"></button>
        <button class="bg-transparent border-none cursor-pointer hover:text-[#8a6210] transition" data-view="about" data-i18n="footer_about"></button>
      </div>
    </div>
  </footer>

  <div id="auth-modal" class="modal">
    <div class="modal-panel p-6 md:p-8">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div id="auth-title" class="text-[24px] font-black"></div>
          <p class="mt-2 text-[14px] leading-7 muted" data-i18n="auth_desc"></p>
        </div>
        <button class="btn-ghost px-4 py-3 text-[11px] font-black uppercase" id="close-auth">Close</button>
      </div>
      <div class="grid grid-cols-1 gap-4 mt-6">
        <input id="auth-name" class="input" data-ph="auth_name_ph" />
        <input id="auth-email" class="input" type="email" data-ph="auth_email_ph" />
        <input id="auth-password" class="input" type="password" data-ph="auth_password_ph" />
        <div class="flex flex-wrap gap-3">
          <button id="auth-submit" class="btn-gold px-6 py-4 text-[12px] font-black uppercase"></button>
          <button class="btn-ghost px-6 py-4 text-[12px] font-black uppercase" id="cancel-auth" data-i18n="cancel"></button>
        </div>
      </div>
    </div>
  </div>

  <div id="legal-modal" class="modal">
    <div class="modal-panel p-6 md:p-8">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <div class="text-[24px] font-black" data-i18n="legal_modal_title"></div>
          <p class="mt-2 text-[14px] leading-7 muted" data-i18n="legal_modal_desc"></p>
        </div>
        <button class="btn-ghost px-4 py-3 text-[11px] font-black uppercase" id="close-legal">Close</button>
      </div>
      <div class="mt-6 legal-grid">
        <div class="panel p-5"><div class="text-[15px] font-black uppercase tracking-[0.18em]" data-i18n="legal_block_1_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="legal_block_1_desc"></p></div>
        <div class="panel p-5"><div class="text-[15px] font-black uppercase tracking-[0.18em]" data-i18n="legal_block_2_title"></div><p class="mt-3 text-[14px] leading-7 muted" data-i18n="legal_block_2_desc"></p></div>
      </div>
    </div>
  </div>
</body>
</html>
